<!DOCTYPE html><html>
<head>
<title>Hiragana Flashcards</title>
<link rel="stylesheet" href="style.css">
</head><body><header>
<h1>📚 Hiragana Flashcards</h1>
<p>Tap the card to see the answer</p>
</header><div class="modules"><div class="card" onclick="flip(this)">
<span class="front">あ</span>
<span class="back">a</span>
</div><div class="card" onclick="flip(this)">

<span class="back">i</span>
</div><div class="card" onclick="flip(this)">
<span class="front">う</span>
<span class="back">u</span>
</div><div class="card" onclick="flip(this)">
<span class="front">え</span>
<span class="back">e</span>
</div><div class="card" onclick="flip(this)">
<span class="front">お</span>
<span class="back">o</span>
</div>

</div>
  <div class="hiragana-table">

<h2>Dakuten / Handakuten</h2>

<table>

<tr>
<th>g</th>
<td>が</td>
<td>ぎ</td>
<td>ぐ</td>
<td>げ</td>
<td>ご</td>
</tr>

<tr>
<th>z</th>
<td>ざ</td>
<td>じ</td>
<td>ず</td>
<td>ぜ</td>
<td>ぞ</td>
</tr>

<tr>
<th>d</th>
<td>だ</td>
<td>ぢ</td>
<td>づ</td>
<td>で</td>
<td>ど</td>
</tr>

<tr>
<th>b</th>
<td>ば</td>
<td>び</td>
<td>ぶ</td>
<td>べ</td>
<td>ぼ</td>
</tr>

<tr>
<th>p</th>

<td>ぽ</td>
</tr>

</table>

  </div>

function flip(card){
card.classList.toggle("flipped")
}
</script>
</body>
</html>
