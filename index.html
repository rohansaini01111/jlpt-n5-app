<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JapaneseGO</title>

<style>

<body>

<header>JapaneseGO</header>
<p>Learn Japanese the Smart Way 🚀</p>

<div class="path">

<div class="bubble" onclick="startQuiz(1)">1</div>

<div class="bubble lock">2</div>

<div class="bubble lock">3</div>

<div class="bubble lock">4</div>

<div class="bubble lock">5</div>

</div>

<div id="quiz" class="quiz">

<h2 id="question"></h2>

<div id="options"></div>

</div>

<script>

const quizzes = {

1:{
q:"みず (mizu) means?",
o:["Water","Dog","Book","Car"],
c:0
}

}

function startQuiz(n){

let data = quizzes[n]

document.getElementById("quiz").style.display="block"

document.getElementById("question").innerText = data.q

let html=""

data.o.forEach((opt,i)=>{

html += `<div class="option" onclick="answer(${i},${data.c})">${opt}</div>`

})

document.getElementById("options").innerHTML = html

}

function answer(sel,cor){

if(sel==cor){

alert("Correct 🎉")

}else{

alert("Wrong ❌")

}

}

</script>

</body>

<header>JapaneseGO</header>

<div class="lesson" onclick="startQuiz()">
Start Lesson
</div>

<div class="quiz" id="quiz">

<h2>みず (mizu) means?</h2>

<div class="option" onclick="correct()">Water</div>

<div class="option" onclick="wrong()">Dog</div>

<div class="option" onclick="wrong()">Book</div>

<div class="option" onclick="wrong()">Car</div>

</div>

<script>

function startQuiz(){
document.getElementById("quiz").style.display="block"
}

function correct(){
alert("Correct 🎉")
}

function wrong(){
alert("Wrong ❌")
}

</script>

</body>
  </html>
