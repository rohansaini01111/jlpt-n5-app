<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JapaneseGO</title>

<style>

body{
background:#0b0018;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
padding:20px;
}

h1{
color:#d18cff;
text-shadow:0 0 25px #d18cff;
}

.stats{
display:flex;
gap:20px;
font-size:16px;
}

/* PATH */

.path{
margin-top:60px;
display:grid;
grid-template-columns:repeat(3,100px);
justify-content:center;
gap:35px;
}

.bubble{

width:90px;
height:90px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#1b002f;

border:3px solid #d18cff;

box-shadow:0 0 25px #d18cff;

font-size:22px;

cursor:pointer;

transition:0.3s;

}

.bubble:hover{

transform:scale(1.1);

box-shadow:0 0 40px #d18cff;

}

.lock{
opacity:0.3;
border:3px solid gray;
box-shadow:none;
cursor:not-allowed;
}

/* QUIZ */

.quiz{

display:none;

margin-top:40px;

padding:20px;

border-radius:20px;

border:2px solid #d18cff;

box-shadow:0 0 25px #d18cff;

width:80%;
margin-left:auto;
margin-right:auto;

}

.option{

background:#22003d;

padding:12px;

margin:10px;

border-radius:10px;

border:1px solid #d18cff;

cursor:pointer;

}

.option:hover{

background:#d18cff;
color:black;

}

</style>

</head>

<body>
<header class="header">

  <div class="logo">JapaneseGO</div>

  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="hiragana.html">Hiragana</a>
    <a href="katakana.html">Katakana</a>
    <a href="vocabulary.html">Vocabulary</a>
    <a href="practice.html">Practice</a>
  </nav>

  <div class="stats">
    <span id="xp">⭐ XP: 0</span>
    <span id="streak">🔥 Streak: 0</span>
  </div>

</header>

<p>Learn Japanese the Smart Way 🚀</p>

<div class="path">

<div class="bubble" onclick="startQuiz(1)">1</div>

<div class="bubble lock" id="l2">2</div>

<div class="bubble lock" id="l3">3</div>

<div class="bubble lock" id="l4">4</div>

<div class="bubble lock" id="l5">5</div>

</div>

<div id="quiz" class="quiz">

<h2 id="question"></h2>

<div id="options"></div>

</div>

<script>

let xp = localStorage.getItem("xp") || 0
let streak = localStorage.getItem("streak") || 0

document.getElementById("xp").innerText = "⭐ XP: " + xp
document.getElementById("streak").innerText = "🔥 Streak: " + streak

const quizzes = {

1:{
q:"みず (mizu) means?",
o:["Water","Dog","Book","Car"],
c:0
},

2:{
q:"いぬ (inu) means?",
o:["Dog","Cat","School","Book"],
c:0
},

3:{
q:"ねこ (neko) means?",
o:["Cat","Water","Pen","Teacher"],
c:0
},

4:{
q:"ほん (hon) means?",
o:["Book","Car","Dog","Food"],
c:0
},

5:{
q:"がっこう (gakkou) means?",
o:["School","Teacher","Water","Dog"],
c:0
}

}

function startQuiz(n){

if(document.getElementById("l"+n)?.classList.contains("lock")) return

let data = quizzes[n]

document.getElementById("quiz").style.display="block"

document.getElementById("question").innerText = data.q

let html=""

data.o.forEach((opt,i)=>{

html += `<div class="option" onclick="answer(${i},${data.c},${n})">${opt}</div>`

})

document.getElementById("options").innerHTML = html

}

function answer(sel,cor,lesson){

if(sel==cor){

xp = parseInt(xp) + 10
streak = parseInt(streak) + 1

alert("Correct 🎉")

unlock(lesson)

}else{

streak = 0
alert("Wrong ❌")

}

localStorage.setItem("xp",xp)
localStorage.setItem("streak",streak)

document.getElementById("xp").innerText="⭐ XP: "+xp
document.getElementById("streak").innerText="🔥 Streak: "+streak

}

function unlock(n){

let next = document.getElementById("l"+(n+1))

if(next) next.classList.remove("lock")

}

</script>

</body>
  </html>
