<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>JapaneseGO</title>

<style>

body{
background:#0a0014;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

h1{
color:#c77dff;
text-shadow:0 0 25px #c77dff;
}

.stats{
display:flex;
gap:20px;
font-size:16px;
}

/* SUBTITLE */

.subtitle{
color:#bbb;
margin-top:-10px;
}

/* LESSON PATH */

.path{
margin-top:60px;
display:grid;
grid-template-columns:repeat(3,100px);
justify-content:center;
gap:35px;
}

.bubble{

width:90px;
height:90px;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

background:#140024;

border:3px solid #c77dff;

box-shadow:0 0 25px #c77dff;

font-size:22px;

cursor:pointer;

transition:0.3s;

}

.bubble:hover{

transform:scale(1.1);

box-shadow:0 0 40px #c77dff;

}

/* LOCKED LESSON */

.lock{
opacity:0.3;
border:3px solid gray;
box-shadow:none;
cursor:not-allowed;
}

/* QUIZ BOX */

.quiz{

display:none;

margin-top:40px;

padding:20px;

border-radius:20px;

border:2px solid #c77dff;

box-shadow:0 0 25px #c77dff;

width:80%;
margin-left:auto;
margin-right:auto;

}

/* OPTIONS */

.option{

background:#1c0030;

padding:12px;

margin:10px;

border-radius:10px;

border:1px solid #c77dff;

cursor:pointer;

}

.option:hover{

background:#c77dff;
color:black;

}

</style>

</head>

<body>

<div class="topbar">

<h1>JapaneseGO</h1>

<div class="stats">

<span id="xp">⭐ XP: 0</span>

<span id="streak">🔥 Streak: 0</span>

</div>

</div>

<p class="subtitle">Learn Japanese the Smart Way 🚀</p>

<div class="path">

<div class="bubble" onclick="startQuiz(1)">1</div>

<div class="bubble lock">2</div>

<div class="bubble lock">3</div>

<div class="bubble lock">4</div>

<div class="bubble lock">5</div>

</div>

<div id="quiz" class="quiz">

<h2 id="question"></h2>

<div id="options"></div>

</div>

<script>

let xp = 0
let streak = 0

const quizzes = {

1:{
q:"みず (mizu) means?",
o:["Water","Dog","Book","Car"],
c:0
}

}

function startQuiz(n){

let data = quizzes[n]

document.getElementById("quiz").style.display="block"

document.getElementById("question").innerText = data.q

let html=""

data.o.forEach((opt,i)=>{

html += `<div class="option" onclick="answer(${i},${data.c})">${opt}</div>`

})

document.getElementById("options").innerHTML = html

}

function answer(sel,cor){

if(sel==cor){

alert("Correct 🎉")

xp += 10
streak += 1

}else{

alert("Wrong ❌")

streak = 0

}

document.getElementById("xp").innerText = "⭐ XP: " + xp
document.getElementById("streak").innerText = "🔥 Streak: " + streak

}

</script>

</body>
</html>
