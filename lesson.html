<!DOCTYPE html>
<html>

<head>

</head>

<body>

</table>

<div class="back-wrapper">
<a class="back-btn" href="vocabulary.html">← Back</a>
</div>

<script src="vocab.js"></script>
<script>
  
const params = new URLSearchParams(window.location.search)

const lessonName = params.get("lesson") || "lesson1"

document.getElementById("lesson-title").innerText =
lessonName.replace("lesson","Lesson ")

const lesson = vocabulary[lessonName]

if(!lesson){
console.error("Lesson not found")
}
/* MAIN VOCAB */

const extraTable = document.getElementById("extra-table")
lesson.main.forEach(word => {

let row = document.createElement("tr")

row.innerHTML = `
<td>${word.jp}</td>
<td>${word.romaji}</td>
<td>${word.en}</td>
`

mainTable.appendChild(row)

})

/* EXTRA WORDS */

const extraTable = document.getElementById("extra-table")

lesson.extra.forEach(word => {

let row = document.createElement("tr")

row.innerHTML = `
<td>${word.jp}</td>
<td>${word.romaji}</td>
<td>${word.en}</td>
`

extraTable.appendChild(row)

})

document.querySelectorAll("td").forEach(cell=>{

cell.addEventListener("click",()=>{

let text = cell.innerText

let speech = new SpeechSynthesisUtterance(text)

speech.lang="ja-JP"

speech.rate=0.9

speechSynthesis.speak(speech)

})

})

  function speakWord(jp,en){

enVoice.lang = "en-US"

setTimeout(()=>{
speechSynthesis.speak(enVoice)
},800)

</script>
  
</body>
</html>
