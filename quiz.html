<!DOCTYPE html>
<html>

<head>
<title>Quiz - JapaneseGO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🧠 JLPT N5 Quiz</h1>
<p>Choose the correct answer</p>
</header>

<div class="quiz-card">

<h2 id="question">What is this?</h2>

<div class="japanese">あ</div>

<div class="options">
<button onclick="checkAnswer('a')">A) a</button>
<button onclick="checkAnswer('i')">B) i</button>
<button onclick="checkAnswer('u')">C) u</button>
</div>

<p id="result"></p>

<a href="index.html" class="back-btn">⬅ Back</a>

</div>

<script>

let xp = 120

function checkAnswer(answer){

if(answer === "a"){
document.getElementById("result").innerHTML="✅ Correct! +10 XP"
xp += 10
}
else{
document.getElementById("result").innerHTML="❌ Wrong answer"
}

}

<script>

let xp = localStorage.getItem("xp") || 0
let questions = [
{
question:"What is this?",
japanese:"あ",
options:["a","i","u"],
correct:"a"
},
{
question:"What is this?",
japanese:"い",
options:["a","i","e"],
correct:"i"
},
{
question:"What is this?",
japanese:"う",
options:["o","u","a"],
correct:"u"
}
]

let current = 0

function loadQuestion(){

document.getElementById("question").innerText =
questions[current].question

document.querySelector(".japanese").innerText =
questions[current].japanese

let buttons = document.querySelectorAll(".options button")

buttons[0].innerText = "A) " + questions[current].options[0]
buttons[1].innerText = "B) " + questions[current].options[1]
buttons[2].innerText = "C) " + questions[current].options[2]

}

function checkAnswer(answer){

if(answer === questions[current].correct){
document.getElementById("result").innerHTML = "✅ Correct +10 XP"
xp += 10
localStorage.setItem("xp", xp)
}else{
document.getElementById("result").innerHTML = "❌ Wrong"
}

current++

if(current < questions.length){

setTimeout(()=>{
document.getElementById("result").innerHTML=""
loadQuestion()
},1000)

}else{

document.getElementById("question").innerHTML="Quiz Finished 🎉"
document.querySelector(".japanese").innerHTML=""
document.querySelector(".options").innerHTML="Score XP: "+xp

}

}

loadQuestion()

</script>

</body>
</html>
